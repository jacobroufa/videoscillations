<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hypnewcade</title>
  <style>
    /* ---- CSS custom properties for UI theming ---- */
    :root {
      --ui-bg: rgba(10, 10, 14, 0.78);
      --ui-border: rgba(255, 255, 255, 0.06);
      --ui-text: rgba(220, 220, 230, 0.9);
      --ui-text-dim: rgba(180, 180, 195, 0.6);
      --ui-accent: rgba(0, 220, 255, 0.8);
      --ui-accent-dim: rgba(0, 220, 255, 0.3);
      --ui-btn-bg: rgba(255, 255, 255, 0.07);
      --ui-btn-hover: rgba(255, 255, 255, 0.14);
      --ui-font: 'SF Mono', 'Fira Code', 'Cascadia Code', 'Consolas', monospace;
      --ui-panel-width: 280px;
      --ui-transition: 0.35s ease;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #000;
    }

    canvas {
      display: block;
      width: 100vw;
      height: 100vh;
    }

    /* ---- Overlay panel ---- */
    #synth-panel {
      position: fixed;
      top: 0;
      right: 0;
      width: var(--ui-panel-width);
      height: 100vh;
      overflow-y: auto;
      overflow-x: hidden;

      background: var(--ui-bg);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border-left: 1px solid var(--ui-border);

      font-family: var(--ui-font);
      font-size: 11px;
      color: var(--ui-text);

      padding: 12px 10px 20px;
      z-index: 1000;

      /* Hidden by default, fade in/out */
      opacity: 0;
      pointer-events: none;
      transition: opacity var(--ui-transition);
    }

    #synth-panel.visible {
      opacity: 1;
      pointer-events: auto;
    }

    /* Thin scrollbar */
    #synth-panel::-webkit-scrollbar {
      width: 4px;
    }
    #synth-panel::-webkit-scrollbar-track {
      background: transparent;
    }
    #synth-panel::-webkit-scrollbar-thumb {
      background: rgba(255, 255, 255, 0.15);
      border-radius: 2px;
    }

    /* ---- Section labels ---- */
    .panel-section {
      margin-bottom: 10px;
    }

    .section-label {
      font-size: 10px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--ui-accent);
      margin-bottom: 6px;
      padding-bottom: 3px;
      border-bottom: 1px solid var(--ui-border);
    }

    /* ---- Slider rows ---- */
    .slider-row {
      display: grid;
      grid-template-columns: 1fr 1fr 42px;
      align-items: center;
      gap: 4px;
      margin-bottom: 4px;
      max-height: 28px;
      opacity: 1;
      overflow: hidden;
      transition: max-height 0.25s ease, opacity 0.2s ease, margin 0.25s ease;
    }

    .slider-row.hidden {
      max-height: 0;
      opacity: 0;
      margin-bottom: 0;
    }

    .slider-label {
      font-size: 10px;
      color: var(--ui-text-dim);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      cursor: pointer;
      transition: color 0.15s ease, opacity 0.1s ease;
    }

    .slider-label:hover {
      color: #0ff;
    }

    .slider-label:active {
      opacity: 0.6;
    }

    .slider-value {
      font-size: 10px;
      color: var(--ui-text);
      text-align: right;
      font-variant-numeric: tabular-nums;
    }

    /* ---- Range slider styling ---- */
    .slider-input {
      -webkit-appearance: none;
      appearance: none;
      width: 100%;
      height: 4px;
      background: rgba(255, 255, 255, 0.1);
      border-radius: 2px;
      outline: none;
      cursor: pointer;
    }

    .slider-input::-webkit-slider-thumb {
      -webkit-appearance: none;
      appearance: none;
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: var(--ui-accent);
      cursor: pointer;
      border: none;
      transition: transform 0.1s ease;
    }

    .slider-input::-webkit-slider-thumb:hover {
      transform: scale(1.3);
    }

    .slider-input::-moz-range-thumb {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: var(--ui-accent);
      cursor: pointer;
      border: none;
    }

    .slider-input::-moz-range-track {
      height: 4px;
      background: rgba(255, 255, 255, 0.1);
      border-radius: 2px;
      border: none;
    }

    /* ---- Preset buttons ---- */
    .preset-row {
      display: flex;
      flex-wrap: wrap;
      gap: 4px;
    }

    .preset-btn {
      font-family: var(--ui-font);
      font-size: 9px;
      padding: 4px 7px;
      border: 1px solid var(--ui-border);
      border-radius: 3px;
      background: var(--ui-btn-bg);
      color: var(--ui-text);
      cursor: pointer;
      transition: background 0.15s ease, border-color 0.15s ease;
    }

    .preset-btn:hover {
      background: var(--ui-btn-hover);
      border-color: var(--ui-accent-dim);
    }

    /* ---- Shape type selector ---- */
    .shape-type-row {
      display: flex;
      flex-wrap: wrap;
      gap: 3px;
      margin-bottom: 8px;
    }

    .shape-type-btn {
      font-family: var(--ui-font);
      font-size: 8px;
      padding: 3px 5px;
      border: 1px solid var(--ui-border);
      border-radius: 3px;
      background: var(--ui-btn-bg);
      color: var(--ui-text-dim);
      cursor: pointer;
      transition: background 0.15s ease, border-color 0.15s ease, color 0.15s ease;
    }

    .shape-type-btn:hover {
      background: var(--ui-btn-hover);
      border-color: var(--ui-accent-dim);
    }

    .shape-type-btn.active {
      background: var(--ui-accent-dim);
      border-color: var(--ui-accent);
      color: var(--ui-text);
    }

    /* ---- Movement mode selector ---- */
    .movement-mode-row {
      display: flex;
      flex-wrap: wrap;
      gap: 3px;
      margin-bottom: 8px;
    }

    .movement-mode-btn {
      font-family: var(--ui-font);
      font-size: 8px;
      padding: 3px 5px;
      border: 1px solid var(--ui-border);
      border-radius: 3px;
      background: var(--ui-btn-bg);
      color: var(--ui-text-dim);
      cursor: pointer;
      transition: background 0.15s ease, border-color 0.15s ease, color 0.15s ease;
    }

    .movement-mode-btn:hover {
      background: var(--ui-btn-hover);
      border-color: var(--ui-accent-dim);
    }

    .movement-mode-btn.active {
      background: var(--ui-accent-dim);
      border-color: var(--ui-accent);
      color: var(--ui-text);
    }

    /* ---- Color mode selector ---- */
    .color-mode-row {
      display: flex;
      flex-wrap: wrap;
      gap: 3px;
      margin-bottom: 8px;
    }

    .color-mode-btn {
      font-family: var(--ui-font);
      font-size: 8px;
      padding: 3px 5px;
      border: 1px solid var(--ui-border);
      border-radius: 3px;
      background: var(--ui-btn-bg);
      color: var(--ui-text-dim);
      cursor: pointer;
      transition: background 0.15s ease, border-color 0.15s ease, color 0.15s ease;
    }

    .color-mode-btn:hover {
      background: var(--ui-btn-hover);
      border-color: var(--ui-accent-dim);
    }

    .color-mode-btn.active {
      background: var(--ui-accent-dim);
      border-color: var(--ui-accent);
      color: var(--ui-text);
    }

    /* ---- Mirror mode selector ---- */
    .mirror-mode-row {
      display: flex;
      flex-wrap: wrap;
      gap: 3px;
      margin-bottom: 8px;
    }

    .mirror-mode-btn {
      font-family: var(--ui-font);
      font-size: 8px;
      padding: 3px 5px;
      border: 1px solid var(--ui-border);
      border-radius: 3px;
      background: var(--ui-btn-bg);
      color: var(--ui-text-dim);
      cursor: pointer;
      transition: background 0.15s ease, border-color 0.15s ease, color 0.15s ease;
    }

    .mirror-mode-btn:hover {
      background: var(--ui-btn-hover);
      border-color: var(--ui-accent-dim);
    }

    .mirror-mode-btn.active {
      background: var(--ui-accent-dim);
      border-color: var(--ui-accent);
      color: var(--ui-text);
    }

    /* ---- Blend mode selector ---- */
    .blend-mode-row {
      display: flex;
      flex-wrap: wrap;
      gap: 3px;
      margin-bottom: 8px;
    }

    .blend-mode-btn {
      font-family: var(--ui-font);
      font-size: 8px;
      padding: 3px 5px;
      border: 1px solid var(--ui-border);
      border-radius: 3px;
      background: var(--ui-btn-bg);
      color: var(--ui-text-dim);
      cursor: pointer;
      transition: background 0.15s ease, border-color 0.15s ease, color 0.15s ease;
    }

    .blend-mode-btn:hover {
      background: var(--ui-btn-hover);
      border-color: var(--ui-accent-dim);
    }

    .blend-mode-btn.active {
      background: var(--ui-accent-dim);
      border-color: var(--ui-accent);
      color: var(--ui-text);
    }

    /* ---- Action buttons ---- */
    .actions-row {
      display: flex;
      flex-wrap: wrap;
      gap: 4px;
    }

    .action-btn {
      font-family: var(--ui-font);
      font-size: 9px;
      padding: 4px 8px;
      border: 1px solid var(--ui-accent-dim);
      border-radius: 3px;
      background: transparent;
      color: var(--ui-accent);
      cursor: pointer;
      transition: background 0.15s ease;
    }

    .action-btn:hover {
      background: var(--ui-btn-hover);
    }

    /* ---- Subsection toggle buttons (Angle LFO, Osc2 enable) ---- */
    .subsection {
      margin-top: 6px;
    }

    .subsection-toggle-btn {
      font-family: var(--ui-font);
      font-size: 9px;
      padding: 4px 8px;
      border: 1px solid var(--ui-border);
      border-radius: 3px;
      background: var(--ui-btn-bg);
      color: var(--ui-text-dim);
      cursor: pointer;
      transition: background 0.15s ease, border-color 0.15s ease, color 0.15s ease;
      width: 100%;
      text-align: center;
      margin-bottom: 6px;
    }

    .subsection-toggle-btn:hover {
      background: var(--ui-btn-hover);
      border-color: var(--ui-accent-dim);
    }

    .subsection-toggle-btn.active {
      background: var(--ui-accent-dim);
      border-color: var(--ui-accent);
      color: var(--ui-text);
    }

    /* ---- Collapsible sections ---- */
    .collapsible-section {
      max-height: 1200px;
      opacity: 1;
      overflow: hidden;
      transition: max-height 0.35s ease, opacity 0.25s ease;
    }

    .collapsible-section.collapsed {
      max-height: 0;
      opacity: 0;
    }

    /* ---- Subsection labels ---- */
    .subsection-label {
      font-size: 9px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--ui-text-dim);
      margin-top: 8px;
      margin-bottom: 6px;
      padding-bottom: 2px;
      border-bottom: 1px solid var(--ui-border);
    }

    /* ---- Mirror target row ---- */
    .mirror-target-row {
      display: flex;
      flex-wrap: wrap;
      gap: 3px;
      margin-bottom: 8px;
    }

    /* ---- Keyboard hint ---- */
    .keyboard-hint {
      margin-top: 12px;
      padding-top: 8px;
      border-top: 1px solid var(--ui-border);
      font-size: 9px;
      color: var(--ui-text-dim);
      line-height: 1.6;
    }

    .keyboard-hint kbd {
      display: inline-block;
      padding: 1px 4px;
      border: 1px solid var(--ui-border);
      border-radius: 2px;
      background: var(--ui-btn-bg);
      font-family: var(--ui-font);
      font-size: 9px;
      color: var(--ui-text);
    }

    /* ---- Top-level tab bar ---- */
    .tab-bar {
      display: flex;
      gap: 2px;
      margin-bottom: 10px;
      border-bottom: 1px solid var(--ui-border);
      padding-bottom: 6px;
    }

    .tab-btn {
      flex: 1;
      font-family: var(--ui-font);
      font-size: 10px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      padding: 6px 8px;
      border: 1px solid var(--ui-border);
      border-radius: 4px 4px 0 0;
      background: transparent;
      color: var(--ui-text-dim);
      cursor: pointer;
      transition: background 0.15s ease, color 0.15s ease, border-color 0.15s ease;
    }

    .tab-btn:hover {
      background: var(--ui-btn-hover);
      color: var(--ui-text);
    }

    .tab-btn.active {
      background: var(--ui-accent-dim);
      border-color: var(--ui-accent);
      color: var(--ui-text);
    }

    .tab-content {
      display: none;
    }

    .tab-content.active {
      display: block;
    }

    /* ---- Sub-tab bar (Factory / My Presets) ---- */
    .sub-tab-bar {
      display: flex;
      gap: 2px;
      margin-bottom: 8px;
    }

    .sub-tab-btn {
      flex: 1;
      font-family: var(--ui-font);
      font-size: 9px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      padding: 5px 6px;
      border: 1px solid var(--ui-border);
      border-radius: 3px;
      background: transparent;
      color: var(--ui-text-dim);
      cursor: pointer;
      transition: background 0.15s ease, color 0.15s ease, border-color 0.15s ease;
    }

    .sub-tab-btn:hover {
      background: var(--ui-btn-hover);
      color: var(--ui-text);
    }

    .sub-tab-btn.active {
      background: var(--ui-accent-dim);
      border-color: var(--ui-accent);
      color: var(--ui-text);
    }

    .sub-tab-content {
      display: none;
    }

    .sub-tab-content.active {
      display: block;
    }

    /* ---- Preset grid ---- */
    .preset-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 6px;
      margin-top: 6px;
    }

    /* ---- Preset card ---- */
    .preset-card {
      position: relative;
      background: rgba(255, 255, 255, 0.04);
      border: 1px solid var(--ui-border);
      border-radius: 4px;
      cursor: pointer;
      overflow: hidden;
      transition: border-color 0.15s ease, background 0.15s ease;
    }

    .preset-card:hover {
      border-color: var(--ui-accent-dim);
      background: rgba(255, 255, 255, 0.08);
    }

    .preset-card.read-only {
      border-left: 2px solid rgba(0, 220, 255, 0.2);
    }

    .preset-card .thumbnail {
      width: 100%;
      aspect-ratio: 4 / 3;
      object-fit: cover;
      display: block;
    }

    .preset-card .placeholder-thumb {
      width: 100%;
      aspect-ratio: 4 / 3;
      background: rgba(255, 255, 255, 0.03);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      color: var(--ui-text-dim);
      opacity: 0.3;
    }

    .preset-card .card-name {
      font-family: var(--ui-font);
      font-size: 9px;
      color: var(--ui-text);
      padding: 4px 6px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    /* ---- Hover actions overlay ---- */
    .preset-card .hover-actions {
      position: absolute;
      top: 0;
      right: 0;
      display: flex;
      gap: 2px;
      padding: 3px;
      opacity: 0;
      transition: opacity 0.15s ease;
    }

    .preset-card:hover .hover-actions {
      opacity: 1;
    }

    .hover-actions .action-icon {
      width: 22px;
      height: 22px;
      border: none;
      border-radius: 3px;
      background: rgba(0, 0, 0, 0.7);
      color: var(--ui-text);
      font-size: 11px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.1s ease;
      font-family: var(--ui-font);
    }

    .hover-actions .action-icon:hover {
      background: rgba(0, 220, 255, 0.4);
    }

    .hover-actions .action-icon.danger:hover {
      background: rgba(255, 60, 60, 0.5);
    }

    /* ---- Screenshot delete button (bottom-right of thumbnail) ---- */
    .preset-card .screenshot-actions {
      position: absolute;
      bottom: 24px;
      right: 0;
      display: flex;
      gap: 2px;
      padding: 3px;
      opacity: 0;
      transition: opacity 0.15s ease;
    }

    .preset-card:hover .screenshot-actions {
      opacity: 1;
    }

    /* ---- Info notice ---- */
    .info-notice {
      background: rgba(0, 220, 255, 0.06);
      border: 1px solid rgba(0, 220, 255, 0.15);
      border-radius: 4px;
      padding: 6px 8px;
      margin-bottom: 8px;
      font-size: 9px;
      color: var(--ui-text-dim);
      line-height: 1.5;
    }

    .info-notice .notice-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      cursor: pointer;
    }

    .info-notice .notice-header span {
      font-weight: 600;
      color: var(--ui-accent);
      font-size: 9px;
    }

    .info-notice .notice-dismiss {
      background: none;
      border: none;
      color: var(--ui-text-dim);
      font-family: var(--ui-font);
      font-size: 10px;
      cursor: pointer;
      padding: 0 2px;
    }

    .info-notice .notice-body {
      margin-top: 4px;
    }

    .info-notice.collapsed .notice-body {
      display: none;
    }

    /* ---- Save / Import / Export buttons ---- */
    .save-btn, .import-btn, .export-btn {
      font-family: var(--ui-font);
      font-size: 9px;
      padding: 5px 8px;
      border: 1px solid var(--ui-accent-dim);
      border-radius: 3px;
      background: transparent;
      color: var(--ui-accent);
      cursor: pointer;
      transition: background 0.15s ease;
    }

    .save-btn:hover, .import-btn:hover, .export-btn:hover {
      background: var(--ui-btn-hover);
    }

    .save-btn {
      width: 100%;
      margin-bottom: 8px;
      font-weight: 600;
    }

    .import-export-row {
      display: flex;
      gap: 4px;
      margin-bottom: 8px;
    }

    .import-export-row .import-btn,
    .import-export-row .export-btn {
      flex: 1;
    }

    /* ---- Inline edit ---- */
    .inline-edit {
      font-family: var(--ui-font);
      font-size: 9px;
      padding: 2px 4px;
      border: 1px solid var(--ui-accent);
      border-radius: 2px;
      background: rgba(0, 0, 0, 0.8);
      color: var(--ui-text);
      width: calc(100% - 12px);
      margin: 2px 6px;
      outline: none;
    }

    /* ---- Confirm delete ---- */
    .confirm-delete {
      position: absolute;
      inset: 0;
      background: rgba(0, 0, 0, 0.85);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 6px;
      z-index: 10;
      border-radius: 4px;
    }

    .confirm-delete span {
      font-family: var(--ui-font);
      font-size: 9px;
      color: var(--ui-text);
    }

    .confirm-delete .confirm-btns {
      display: flex;
      gap: 4px;
    }

    .confirm-delete button {
      font-family: var(--ui-font);
      font-size: 9px;
      padding: 3px 8px;
      border-radius: 3px;
      cursor: pointer;
      border: 1px solid var(--ui-border);
      background: var(--ui-btn-bg);
      color: var(--ui-text);
    }

    .confirm-delete button.confirm-yes {
      border-color: rgba(255, 60, 60, 0.5);
      color: #f66;
    }

    .confirm-delete button.confirm-yes:hover {
      background: rgba(255, 60, 60, 0.3);
    }

    .confirm-delete button.confirm-no:hover {
      background: var(--ui-btn-hover);
    }

    /* ---- Empty state ---- */
    .empty-state {
      text-align: center;
      padding: 20px 10px;
      color: var(--ui-text-dim);
      font-size: 10px;
      line-height: 1.6;
    }
  </style>
</head>
<body>
  <canvas id="c"></canvas>
  <script type="module" src="./src/main.js"></script>
</body>
</html>
